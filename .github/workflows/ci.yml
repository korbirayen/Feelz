name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download NLTK data
        run: python -m nltk.downloader punkt punkt_tab stopwords vader_lexicon

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy .

      - name: Run tests
        run: pytest -q

  evaluate-model:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-eval.txt

      - name: Download NLTK data
        run: python -m nltk.downloader punkt punkt_tab stopwords vader_lexicon

      - name: Reproduce the depression-model evaluation
        run: python evaluate_depression_model.py

      - name: Upload metrics + confusion matrices
        uses: actions/upload-artifact@v4
        with:
          name: depression-model-metrics
          path: |
            Depression Model/results/metrics.json
            Depression Model/results/metrics.md
            Depression Model/results/*.png
